services:
  medical_server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical_server
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=8080
      - LOG_LEVEL=information
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - MONGO_DATABASE=medical_db
    restart: unless-stopped
    networks:
      - medical_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongodb:
    image: mongo:5.0
    container_name: medical_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    networks:
      - medical_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  swagger-ui:
    image: swaggerapi/swagger-ui:latest
    container_name: medical_swagger
    ports:
      - "8081:8080"
    environment:
      - SWAGGER_JSON=/openapi.yaml
      - URL=http://localhost:8080/swagger.yaml
    volumes:
      - ./openapi.yaml:/openapi.yaml:ro
    depends_on:
      - medical_server
    restart: unless-stopped
    networks:
      - medical_net

networks:
  medical_net:
    driver: bridge

volumes:
  mongo_data: