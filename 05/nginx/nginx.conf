events {
    worker_connections 1024;
}

http {
    upstream medical_records_api {
        server medical-records-api:8080;
    }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://medical_records_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://medical_records_api/health;
        }

        location /api/ {
            proxy_pass http://medical_records_api/api/;
        }

        location /swagger.yaml {
            proxy_pass http://medical_records_api/swagger.yaml;
        }
    }
}