openapi: 3.0.3
info:
  title: Medical Records API
  description: REST API для системы управления медицинскими записями (Вариант 20)
  version: 1.0.0
  contact:
    name: Занозин Александр
    email: alexzzzit@example.com

servers:
  - url: http://localhost:8080
    description: Local development server

paths:
  /api/v1/auth/login:
    post:
      summary: Аутентификация пользователя
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, password]
              properties:
                login:
                  type: string
                  example: doctor1
                password:
                  type: string
                  example: pass123
      responses:
        '200':
          description: Успешная аутентификация
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                  user_id:
                    type: integer
                  role:
                    type: string
        '401':
          description: Неверные учётные данные

  /api/v1/users:
    post:
      summary: Создание пользователя
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [login, first_name, last_name, password, role]
              properties:
                login:
                  type: string
                first_name:
                  type: string
                last_name:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [patient, doctor, admin, lab_technician]
      responses:
        '201':
          description: Пользователь создан
        '409':
          description: Пользователь существует

  /api/v1/users/login/{login}:
    get:
      summary: Поиск по логину
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: login
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Пользователь найден
        '404':
          description: Не найден
        '401':
          description: Требуется авторизация

  /api/v1/users/search:
    get:
      summary: Поиск по маске имени
      tags: [Users]
      security:
        - BearerAuth: []
      parameters:
        - name: mask
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Список пользователей
        '401':
          description: Требуется авторизация

  /api/v1/patients:
    post:
      summary: Регистрация пациента
      tags: [Patients]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [first_name, last_name, birth_date, policy_number]
              properties:
                first_name:
                  type: string
                last_name:
                  type: string
                middle_name:
                  type: string
                birth_date:
                  type: string
                  format: date
                policy_number:
                  type: string
      responses:
        '201':
          description: Пациент зарегистрирован
        '401':
          description: Требуется авторизация

  /api/v1/patients/search:
    get:
      summary: Поиск пациента по ФИО
      tags: [Patients]
      security:
        - BearerAuth: []
      parameters:
        - name: fio
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Список пациентов

  /api/v1/records:
    post:
      summary: Создание медицинской записи
      tags: [Medical Records]
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, patient_id, doctor_id, diagnosis]
              properties:
                code:
                  type: string
                patient_id:
                  type: integer
                doctor_id:
                  type: integer
                diagnosis:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Запись создана

  /api/v1/patients/{patient_id}/records:
    get:
      summary: История записей пациента
      tags: [Medical Records]
      security:
        - BearerAuth: []
      parameters:
        - name: patient_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Список записей

  /api/v1/records/{code}:
    get:
      summary: Получение записи по коду
      tags: [Medical Records]
      security:
        - BearerAuth: []
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Медицинская запись
        '404':
          description: Не найдено

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
