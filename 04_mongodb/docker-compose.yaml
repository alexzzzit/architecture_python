services:
  medical_server:
    build: .
    container_name: medical_server
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      PORT: 8080
      LOG_LEVEL: information
      JWT_SECRET: ${JWT_SECRET:-change-me}
      MONGO_HOST: mongodb
      MONGO_PORT: 27017
      MONGO_DATABASE: medical_db
    restart: unless-stopped

  mongodb:
    image: mongo:5.0
    container_name: medical_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data: